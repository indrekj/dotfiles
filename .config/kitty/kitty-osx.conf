# Tab bar
tab_bar_edge top
tab_bar_style separator
tab_separator " ┇ "
tab_title_max_length 20

# Tab navigation
map cmd+right next_tab
map cmd+left previous_tab
map cmd+comma move_tab_backward
map cmd+period move_tab_forward
map cmd+enter new_tab_with_cwd

# Font
font_family Inconsolata
font_size 19.0

# macOS thickens text by default (default: 1.7 30): gamma 1.7 + 30% contrast,
# tuned for Retina panels. The gamma is what makes glyphs look too bold/heavy
# on lower-DPI external monitors, so drop it to 1.0 — but keep the 30% contrast,
# otherwise colors/text look washed out. Bump gamma toward 1.2 if text reads too
# thin; don't lower the contrast (second number) below ~30.
text_composition_strategy 1.0 30

scrollback_lines 40000

# Make the Option key behave like Alt — needed for word-wise navigation,
# meta shortcuts in shells/editors, etc. Without this, Option types accented chars.
macos_option_as_alt yes

# Don't keep kitty running in the dock after the last window closes
macos_quit_when_last_window_closed yes

# Use kitty's own fast fullscreen instead of macOS's slow native space-switch
macos_traditional_fullscreen yes

# A little breathing room around the text
window_padding_width 8

# Don't show "audio bell" / no annoying flashes
enable_audio_bell no
