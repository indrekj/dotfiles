# Tab bar
tab_bar_edge top
tab_bar_style separator
tab_separator " ┇ "
tab_title_max_length 20

# Tab navigation
map ctrl+shift+page_up next_tab
map ctrl+shift+page_down previous_tab
map ctrl+shift+enter new_tab_with_cwd

# Font
font_size 12.0

scrollback_lines 40000

# A little breathing room around the text
window_padding_width 8

# Don't show "audio bell" / no annoying flashes
enable_audio_bell no
